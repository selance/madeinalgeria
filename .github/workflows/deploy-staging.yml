name: Deploy staging

on:
  push:
    branches: [main]

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  deploy:
    # Only the canonical repo deploys — forks won't have the Cloudflare secrets.
    if: github.repository == 'selance/madeinalgeria'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test

      # Migrations run BEFORE deploying the Workers.
      - name: Apply db-core migrations (staging)
        run: pnpm --filter @mia/api db:migrate:staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy api (staging)
        run: pnpm --filter @mia/api deploy:staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy admin-api (staging)
        run: pnpm --filter @mia/admin-api deploy:staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # Frontends deploy after the APIs (the web worker's API service binding
      # needs its target to exist).
      - name: Deploy web (staging)
        run: pnpm --filter @mia/web deploy:staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy app (staging)
        run: pnpm --filter @mia/app deploy:staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Replace <CF_SUBDOMAIN> with your workers.dev subdomain (or use custom domains).
          VITE_API_BASE_URL: https://mia-api-staging.<CF_SUBDOMAIN>.workers.dev
          VITE_WEB_BASE_URL: https://mia-web-staging.<CF_SUBDOMAIN>.workers.dev

      - name: Deploy admin-web (staging)
        run: pnpm --filter @mia/admin-web deploy:staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          VITE_ADMIN_API_BASE_URL: https://mia-admin-api-staging.<CF_SUBDOMAIN>.workers.dev

      # Repo variables: STAGING_API_URL / STAGING_ADMIN_API_URL, e.g.
      # https://mia-api-staging.<CF_SUBDOMAIN>.workers.dev
      - name: Smoke test /health
        if: vars.STAGING_API_URL != ''
        run: |
          curl -fsS "${{ vars.STAGING_API_URL }}/health"
          curl -fsS "${{ vars.STAGING_ADMIN_API_URL }}/health"
